source-file ~/.config/tmux/tmux-base.conf

#################################################
#             OPENCODE POPUP TMUX               #
#################################################

unbind -n M-o
bind -n M-o detach-client

# Keep the popup focused and visually quiet.
set -g status-position top
set -g status off
set -g status-interval 5
set -g status-style 'fg=colour248,bg=default'
set -g status-left ''
set -g status-right '#(git -C "#{pane_current_path}" rev-parse --abbrev-ref HEAD 2>/dev/null | grep -v "^HEAD$")'
set -g pane-border-lines single
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour110'
set -g message-style 'fg=black,bg=colour110'
set -g display-panes-active-colour colour110
set -g display-panes-colour colour238

# Window list: only useful when more than one task/window is open.
setw -g window-status-separator ' '
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #[bold]#I:#W#[nobold] '

set-hook -g after-new-window 'if-shell "[ #{session_windows} -gt 1 ]" "set -g status on" "set -g status off"'
set-hook -g after-kill-window 'if-shell "[ #{session_windows} -gt 1 ]" "set -g status on" "set -g status off"'

# Smoother popup sizing behavior
setw -g aggressive-resize off
