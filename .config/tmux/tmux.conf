#################################################
#                 GENERAL SETTINGS              #
#################################################

# Window numbering
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# Mouse support
set -g mouse on

# Prevent automatic window renaming
set -g allow-rename off

# History & performance
set -g history-limit 100000
set -g allow-passthrough on
set -g set-clipboard on
set -sg escape-time 0

# Truecolor support
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",xterm-256color:RGB"

# Resize behavior
setw -g aggressive-resize on

# Pane display settings
set -g display-panes-time 2000
set -g display-panes-active-colour colour166
set -g display-panes-colour colour33

# Optional:
setw -g mode-keys vi
# setw -g monitor-activity on

# Hide status bar when only one window
# set -g status off
# set-hook -g after-new-window 'if "[ #{session_windows} -gt 1 ]" "set status on"'
# set-hook -g pane-exited 'if "[ #{session_windows} -lt 2 ]" "set status off"'



#################################################
#              KEYBINDINGS & INPUT              #
#################################################

# Prefix remap
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded config"

# Toggle status bar
unbind t
bind t run-shell "tmux setw -g status \$(tmux show -g -w status | grep -q off && echo on || echo off)"

# Display panes
bind -n C-q display-panes

# Pane splitting (keep cwd)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Remove prefix usage
bind -n M-V split-window -h -c '#{pane_current_path}'
bind -n M-H split-window -v -c  '#{pane_current_path}'

# Swap windows
bind -n C-S-Left swap-window -t -1
bind -n C-S-Right swap-window -t +1

# Pane navigation (arrows)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Pane navigation (vim)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Cycle panes
bind -r Tab select-pane -t :.+

# Zoom alt+z
bind -n M-z resize-pane -Z

# Copy mode
bind -n C-o copy-mode
bind -n M-p paste-buffer -p
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection


# Select windows with alt+num
bind -n M-1 select-window -t:1
bind -n M-2 select-window -t:2
bind -n M-3 select-window -t:3
bind -n M-4 select-window -t:4
bind -n M-5 select-window -t:5
bind -n M-6 select-window -t:6
bind -n M-7 select-window -t:7

# Scroll with mouse
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" \
  "send-keys -M" \
  "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"

# unbind -T copy-mode MouseDragEnd1Pane

# Search in copy mode
bind-key / copy-mode \; send-key ?

# Capture pane → ~/tmp/tmux
bind-key P capture-pane \; capture-pane -S - \; save-buffer ~/tmp/tmux \; delete-buffer

# Capture pane → open in nvim
bind-key -n M-y capture-pane \; \
  capture-pane -S - \; \
  save-buffer ~/tmp/tmux \; \
  delete-buffer \; \
  send-keys Escape 'dnvim ~/tmp/tmux' Enter

# Popup session toggle
bind -n M-m if-shell -F '#{==:#{session_name},popup}' { detach-client } {
    display-popup -E -xC -yC -w80% -h80% 'tmux attach -t popup || tmux new -s popup'
}

# Quick note popup
bind -n M-n display-popup -E "nvim ~/notes/quick-note.md"



#################################################
#                 STATUS BAR BASE               #
#################################################

# Explicitly enable status before theme loads
set -g status on
set -g status-position top

